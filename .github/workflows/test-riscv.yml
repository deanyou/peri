name: Test RISC-V Build

on:
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    build-riscv:
        name: Build (riscv64gc-unknown-linux-gnu)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: riscv64gc-unknown-linux-gnu

            - name: Install cross
              run: cargo install cross

            - name: Build with cross
              run: cross build -p rust-agent-tui --release --target riscv64gc-unknown-linux-gnu

            - name: Verify binary
              run: |
                  file target/riscv64gc-unknown-linux-gnu/release/peri
                  ls -lh target/riscv64gc-unknown-linux-gnu/release/peri

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: agent-tui-linux-riscv64
                  path: target/riscv64gc-unknown-linux-gnu/release/peri
                  retention-days: 3
